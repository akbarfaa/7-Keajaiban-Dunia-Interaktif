<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WonderSphere</title>
    <script>
      // GitHub Pages SPA trick:
      // Save the full URL to sessionStorage then redirect to index.html
      // index.html will read sessionStorage and restore the URL via history.replaceState
      var pathSegmentsToKeep = 1; // keep the repo name segment
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
